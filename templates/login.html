<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intranet de Bonos - Acceso</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #1565c0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo .icon {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
    }
    .logo h1 {
      color: #1a237e;
      font-size: 22px;
      font-weight: 700;
    }
    .logo p {
      color: #666;
      font-size: 13px;
      margin-top: 4px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: #333;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
      outline: none;
      color: #333;
    }
    input:focus {
      border-color: #1a237e;
    }
    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #1a237e, #1565c0);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; }
    .alert {
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 14px;
      margin-bottom: 18px;
    }
    .alert-danger { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }
    .footer-note {
      text-align: center;
      color: #aaa;
      font-size: 12px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <span class="icon">&#128181;</span>
      <h1>Intranet de Bonos</h1>
      <p>Sistema interno de gestion de bonos</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" name="username" placeholder="Tu usuario" required autofocus>
      </div>
      <div class="form-group">
        <label>Contrasena</label>
        <input type="password" name="password" placeholder="Tu contrasena" required>
      </div>
      <button type="submit" class="btn-login">Ingresar</button>
    </form>

    <p class="footer-note">Acceso restringido &mdash; solo personal autorizado</p>
  </div>
</body>
</html>
